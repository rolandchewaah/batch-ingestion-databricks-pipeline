name: main

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}

      # Databricks Repo workspace path
      REPO_PATH: /Workspace/Users/rollux2013@gmail.com/batch-ingestion-databricks-pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Extract branch name
        id: extract_branch_dev
        shell: bash
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Update Repo
        shell: bash
        run: |
          set -euo pipefail
          echo "Updating Databricks repo at: $REPO_PATH"
          databricks repos update "$REPO_PATH" --branch "${{ steps.extract_branch_dev.outputs.branch }}"
          echo Add other actions to build,
          echo test, and deploy your project.

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}

      # Databricks Repo workspace path
      REPO_PATH: /Workspace/Users/rollux2013@gmail.com/batch-ingestion-databricks-pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Extract branch name
        id: extract_branch_prod
        shell: bash
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Update Repo (Prod)
        shell: bash
        run: |
          set -euo pipefail
          echo "Updating Databricks repo at: $REPO_PATH"
          databricks repos update "$REPO_PATH" --branch "${{ steps.extract_branch_prod.outputs.branch }}"
          echo Add other actions to build,
          echo test, and deploy your project.
          
